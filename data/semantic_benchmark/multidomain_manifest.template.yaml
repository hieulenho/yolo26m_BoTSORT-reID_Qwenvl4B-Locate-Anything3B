schema_version: 1
require_review_metadata: true
samples:
  - sample_id: football_video_id
    artifacts:
      discovery: outputs/adaptive_runs/football_video_id/discovery/scene_discovery.json
      route: outputs/adaptive_runs/football_video_id/plan/detector_route.json
      semantics: outputs/adaptive_runs/football_video_id/fused_track_semantics.json
      run_report: outputs/adaptive_runs/football_video_id/adaptive_run_report.json
    ground_truth:
      review:
        status: reviewed
        annotator: REPLACE_WITH_HUMAN_REVIEWER
        reviewed_at: REPLACE_WITH_ISO_DATE
        method: manual_video_and_contact_sheet
      domain: football
      detector_route: football_finetuned
      objects:
        - canonical_name: player
          action: track
        - canonical_name: sports ball
          action: track
      tracks:
        - track_id: 1
          class_label: player
          fine_label: goalkeeper

