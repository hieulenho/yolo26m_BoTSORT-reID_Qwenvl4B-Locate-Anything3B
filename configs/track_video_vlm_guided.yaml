# Config: VLM-Guided Tracking với YOLO gốc (COCO pretrained)
# Pipeline D: Scene Discovery -> YOLO gốc -> BoT-SORT -> Render
#
# Khác với configs/track_video_yolo26m_botsort.yaml:
#   - Dùng yolov8m.pt (pretrain COCO 80 class), KHÔNG phải yolo26m fine-tuned bóng đá
#   - class_ids: null -> tự động đọc từ scene_discovery.json (do VLM sinh ra)
#   - preserve_source_classes: true -> giữ nguyên tên class từ YOLO COCO (car, truck, person...)
#   - target_class_name: auto -> label trên video lấy từ class COCO thực tế, không hardcode "player"

model:
  name: yolov8m_coco
  backend: ultralytics
  # YOLO gốc pretrained trên COCO (80 class): không fine-tune, không bị khóa bóng đá
  checkpoint: yolov8m.pt
  alternative_checkpoints: []
  fallback_checkpoint: yolov8m.pt
  allow_pretrained_fallback: true
  allow_smoke_checkpoint: false

detector:
  imgsz: 960
  conf: 0.25
  iou: 0.65
  max_det: 300
  device: auto
  half: false
  # null = không khóa cứng -> script sẽ inject class_ids từ scene_discovery.json lúc runtime
  class_ids: null
  # "auto" nghĩa là lấy từ COCO label thực tế (car, person, ...)
  # Giữ nguyên tên class gốc COCO thay vì đổi thành "player"
  target_class_id: 0
  target_class_name: auto
  preserve_source_classes: true

tracker:
  name: botsort_reid
  config: configs/botsort_reid.yaml

source:
  path: null        # Được inject lúc runtime bởi script
  type: video

output:
  video: null       # Được inject lúc runtime
  mot: null         # Được inject lúc runtime
  metadata: null
  render_video: true
  save_mot: true

render:
  enabled: true
  show_confidence: false
  show_class: true             # Hiển thị tên class COCO (car, person, ...) thay vì chỉ ID
  show_track_id: true
  show_trajectory: true
  trajectory_length: 30
  line_thickness: 2
  font_scale: 0.55
  show_fps: true

runtime:
  max_frames: null
  start_frame: 1
  overwrite: false
  show_window: false
  save_mot: true
  fail_fast: true
  log_level: INFO
