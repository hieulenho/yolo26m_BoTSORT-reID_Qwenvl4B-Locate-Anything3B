domain:
  name: football
  namespace: football
  description: Football player tracking with SportsMOT-style person/player detections.

model:
  name: yolo26m
  backend: ultralytics
  checkpoint: models/detector/football/yolo26m_best.pt
  alternative_checkpoints:
    - models/detector/yolo26m_best.pt
    - yolo26m.pt
  fallback_checkpoint: yolo26m.pt
  allow_pretrained_fallback: true
  allow_smoke_checkpoint: false

detector:
  imgsz: 960
  conf: 0.10
  conf_floor: 0.001
  iou: 0.65
  max_det: 300
  device: auto
  half: false
  batch: 1
  class_ids:
    - 0
  target_class_id: 0
  target_class_name: player
  preserve_source_classes: false

tracker:
  default_name: botsort_reid
  default_preset: balanced
  default_config: configs/trackers/botsort_balanced.yaml
  presets:
    balanced: configs/trackers/botsort_balanced.yaml
    high_recall: configs/trackers/botsort_high_recall.yaml
    high_identity: configs/trackers/botsort_high_identity.yaml
    fast: configs/trackers/bytetrack_fast.yaml

dataset:
  mot_root: data/mot/sportsmot_football
  default_split: all
  seqmaps:
    train: data/mot/sportsmot_football/seqmaps/train.txt
    val: data/mot/sportsmot_football/seqmaps/val.txt
    test: data/mot/sportsmot_football/seqmaps/test.txt
    all: data/mot/sportsmot_football/seqmaps/all.txt

render:
  show_confidence: false
  show_class: false
  show_track_id: true
  show_trajectory: true
  trajectory_length: 20
  line_thickness: 2
  font_scale: 0.55
  show_fps: true

output:
  runtime:
    max_sequences: null
    max_frames_per_sequence: null
    overwrite: false
    fail_fast: true
    smoke_only: false
    log_level: INFO
