tracker:
  name: ocsort_open_vocab_realtime
  tracker_type: ocsort
  track_high_thresh: 0.05
  track_low_thresh: 0.01
  new_track_thresh: 0.04
  track_buffer: 36
  match_thresh: 0.62
  # Open-vocabulary confidence is not calibrated like COCO confidence. Fusing the
  # low score into IoU would make even identical boxes fail association.
  fuse_score: false
  delta_t: 3
  inertia: 0.18
  use_byte: true
  gmc_method: none
  proximity_thresh: 0.30
  appearance_thresh: 0.90
  with_reid: false
  model: auto
  class_aware: false

output:
  confirmed_only: true
  require_recent_update: true
  max_time_since_update_for_output: 0
  min_hits_for_output: 2
  compact_ids: true

runtime:
  log_level: INFO
