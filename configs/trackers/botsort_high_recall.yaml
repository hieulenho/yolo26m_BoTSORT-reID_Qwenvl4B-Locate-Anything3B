tracker:
  name: botsort_reid
  tracker_type: botsort
  track_high_thresh: 0.25
  track_low_thresh: 0.05
  new_track_thresh: 0.35
  track_buffer: 120
  match_thresh: 0.85
  fuse_score: true
  gmc_method: sparseOptFlow
  proximity_thresh: 0.30
  appearance_thresh: 0.30
  with_reid: true
  model: yolo26n-cls.pt

output:
  confirmed_only: true
  require_recent_update: true
  max_time_since_update_for_output: 0
  min_hits_for_output: 3
  compact_ids: true

runtime:
  log_level: INFO
