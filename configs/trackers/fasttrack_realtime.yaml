tracker:
  name: fasttrack
  tracker_type: fasttrack
  track_high_thresh: 0.30
  track_low_thresh: 0.08
  new_track_thresh: 0.35
  track_buffer: 60
  match_thresh: 0.80
  fuse_score: true
  reset_velocity_offset_occ: 5
  reset_pos_offset_occ: 3
  enlarge_bbox_occ: 1.10
  dampen_motion_occ: 0.60
  active_occ_to_lost_thresh: 12
  occ_cover_thresh: 0.60
  occ_reappear_window: 60
  init_iou_suppress: 0.60
  with_reid: false
  model: auto
  class_aware: false

output:
  confirmed_only: true
  require_recent_update: true
  max_time_since_update_for_output: 0
  min_hits_for_output: 2
  compact_ids: true

runtime:
  log_level: INFO
