backend:
  name: locate_anything
  model_id: nvidia/LocateAnything-3B
  device: cuda
  torch_dtype: bfloat16
  quantization: 8bit

inference:
  task: phrase_grounding
  batch_size: 1
  max_new_tokens: 4096
  prompt_template: "Locate a single instance that matches the following description: {query}."

cache:
  enabled: true
  directory: outputs/locate_tracking/cache

output:
  directory: outputs/locate_tracking/grounding

runtime:
  overwrite: false
  log_level: INFO
