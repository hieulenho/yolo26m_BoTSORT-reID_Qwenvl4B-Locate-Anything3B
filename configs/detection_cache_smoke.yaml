model:
  checkpoint: models/detector/yolov8m_sportsmot_smoke_best.pt
  alternative_checkpoints:
    - models/detector/yolov8m_smoke_best.pt
  allow_smoke_checkpoint: true
  allow_pretrained_fallback: false

dataset:
  name: SportsMOT football
  mot_root: data/mot/sportsmot_football
  split: val
  seqmap: data/mot/sportsmot_football/seqmaps/val.txt

inference:
  imgsz: 640
  conf_floor: 0.001
  iou: 0.70
  max_det: 300
  device: auto
  half: false
  batch: 1
  class_ids:
    - 0

cache:
  root: outputs/detections/cache/sportsmot_football_smoke
  format: jsonl
  save_npz: false
  include_empty_frames: true
  overwrite: true
  validate_after_write: true

runtime:
  max_sequences: 1
  max_frames_per_sequence: 100
  warmup_iterations: 0
  smoke_only: true
  log_level: INFO
