dataset:
  config: configs/legacy/football/data_test.yaml
  manifest: data/interim/mini_tracking_fixture/dataset_manifest.json
  yolo_dataset: data/yolo/mini_tracking_fixture/dataset.yaml
  mot_root: data/mot/mini_tracking_fixture

audit:
  splits:
    - train
    - val
    - test
  include_empty_frames: true
  check_images: true
  check_labels: true
  check_track_ids: true
  check_split_leakage: true
  sample_sequences: 5
  sample_frames_per_sequence: 5
  random_seed: 42
  box_size_bins:
    small_max_ratio: 0.01
    medium_max_ratio: 0.05

output:
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures/dataset_audit
  samples_dir: outputs/figures/annotation_samples

runtime:
  log_level: INFO
  fail_on_error: true
