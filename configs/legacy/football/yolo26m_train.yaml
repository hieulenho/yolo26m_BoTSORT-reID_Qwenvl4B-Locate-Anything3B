experiment:
  name: yolo26m_generic_finetuned
  seed: 42
  deterministic: true

model:
  weights: yolo26m.pt
  task: detect

dataset:
  data_yaml: data/yolo/dataset.yaml
  train_split: train
  validation_split: val
  test_split: test

training:
  epochs: 100
  imgsz: 960
  batch: 2
  patience: 20
  device: auto
  workers: 4
  cache: false
  pretrained: true
  optimizer: auto
  lr0: null
  lrf: null
  weight_decay: null
  warmup_epochs: null
  close_mosaic: 10
  amp: true
  resume: false
  save: true
  save_period: -1
  plots: true
  verbose: true

augmentation:
  hsv_h: null
  hsv_s: null
  hsv_v: null
  degrees: 0.0
  translate: null
  scale: null
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: null
  mixup: 0.0
  copy_paste: 0.0

output:
  project: outputs/training
  run_name: yolo26m_generic
  models_dir: models/detector
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures/yolo26m_finetuned

runtime:
  overwrite: false
  dry_run: false
  smoke_test: false
  max_train_images: null
  max_val_images: null
  log_level: INFO
