experiment:
  name: sort_vs_deepsort_smoke
  seed: 42
  split: val

dataset:
  mot_root: data/mot/sportsmot_football
  seqmap: data/mot/sportsmot_football/seqmaps/val.txt

detections:
  cache_config: configs/legacy/football/detection_cache_smoke.yaml
  cache_root: outputs/detections/cache/sportsmot_football_smoke
  confidence_threshold: 0.15

trackers:
  - name: sort
    config: configs/legacy/football/sort.yaml
  - name: deepsort
    config: configs/legacy/football/deepsort.yaml

evaluation:
  trackeval_config: configs/legacy/football/trackeval_smoke.yaml
  metrics:
    - HOTA
    - CLEAR
    - Identity
  allow_partial_sequences: true

benchmark:
  render_video: false
  measure_tracker_only: true
  measure_end_to_end_from_cache: true
  warmup_sequences: 0

output:
  root: outputs/experiments/sort_vs_deepsort_smoke
  tracks_root: outputs/tracks/comparison_smoke
  metrics_root: outputs/metrics/experiments_smoke
  figures_root: outputs/figures/experiments_smoke
  videos_root: outputs/videos/comparison_smoke

runtime:
  max_sequences: 1
  max_frames_per_sequence: 100
  overwrite: true
  fail_fast: true
  smoke_only: true
  log_level: INFO
