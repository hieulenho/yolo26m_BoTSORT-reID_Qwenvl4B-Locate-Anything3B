base_experiment:
  config: configs/legacy/football/compare_trackers.yaml

ablation:
  sort:
    max_age:
      - 15
      - 30
      - 60
    min_hits:
      - 1
      - 3
    iou_threshold:
      - 0.2
      - 0.3
      - 0.5
  deepsort:
    max_age:
      - 15
      - 30
      - 60
    n_init:
      - 1
      - 3
    max_cosine_distance:
      - 0.2
      - 0.3
      - 0.4
  shared:
    confidence_threshold:
      - 0.15
      - 0.25
      - 0.40

strategy:
  mode: one_factor_at_a_time
  max_experiments: 20
  include_baseline: true

runtime:
  max_sequences: null
  resume: true
  skip_completed: true
  fail_fast: false
  log_level: INFO
