dataset:
  name: soccernet_tracking
  adapter: soccernet
  raw_dir: data/raw
  interim_dir: data/interim

classes:
  mapping_config: configs/legacy/football/class_mapping.yaml
  target_class: player

frames:
  extract_from_video: false
  image_extension: .jpg
  jpeg_quality: 95

split:
  strategy: sequence
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  predefined_split_file: null

yolo:
  output_dir: data/yolo
  decimal_places: 6
  copy_images: false
  prefer_symlink: true

mot:
  output_dir: data/mot
  frame_index_base: 1
  confidence_default: 1.0
  visibility_default: 1.0

validation:
  clip_boxes: true
  invalid_box_policy: warn_and_skip
  unknown_class_policy: warn_and_skip
  fail_on_duplicate_track_in_frame: true

visualization:
  output_dir: outputs/figures/annotation_samples
  num_sequences: 2
  frames_per_sequence: 2
  seed: 42
  draw_ignored: false
  line_thickness: 2
  font_scale: 0.5

runtime:
  dry_run: false
  overwrite: false
  fail_fast: true
  log_level: INFO
