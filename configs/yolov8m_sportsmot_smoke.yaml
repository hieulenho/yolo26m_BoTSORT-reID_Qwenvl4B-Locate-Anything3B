experiment:
  name: yolov8m_sportsmot_smoke
  seed: 42
  deterministic: true

model:
  weights: yolov8m.pt
  task: detect

dataset:
  data_yaml: data/yolo/sportsmot_football_smoke/dataset.yaml
  train_split: train
  validation_split: val
  test_split: test

training:
  epochs: 1
  imgsz: 640
  batch: 2
  patience: 1
  device: auto
  workers: 0
  cache: false
  pretrained: true
  optimizer: auto
  lr0: null
  lrf: null
  weight_decay: null
  warmup_epochs: null
  close_mosaic: 0
  amp: true
  resume: false
  save: true
  save_period: -1
  plots: false
  verbose: true

augmentation:
  degrees: 0.0
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mixup: 0.0
  copy_paste: 0.0

output:
  project: outputs/training
  run_name: yolov8m_sportsmot_smoke
  models_dir: models/detector
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures/yolov8m_sportsmot

runtime:
  overwrite: true
  dry_run: false
  smoke_test: true
  max_train_images: null
  max_val_images: null
  log_level: INFO
