model:
  checkpoint: models/detector/yolov8m_sportsmot_best.pt
  alternative_checkpoints:
    - models/detector/yolov8m_players_best.pt
    - outputs/training/yolov8m_players/weights/best.pt
  allow_smoke_checkpoint: false
  allow_pretrained_fallback: false

dataset:
  name: SportsMOT football
  mot_root: data/mot/sportsmot_football
  split: val
  seqmap: data/mot/sportsmot_football/seqmaps/val.txt

inference:
  imgsz: 960
  conf_floor: 0.001
  iou: 0.70
  max_det: 300
  device: auto
  half: false
  batch: 1
  class_ids:
    - 0

cache:
  root: outputs/detections/cache/sportsmot_football
  format: jsonl
  save_npz: false
  include_empty_frames: true
  overwrite: false
  validate_after_write: true

runtime:
  max_sequences: null
  max_frames_per_sequence: null
  warmup_iterations: 3
  smoke_only: false
  log_level: INFO
