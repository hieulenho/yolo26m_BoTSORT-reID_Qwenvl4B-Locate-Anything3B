output_dir: ../../outputs/benchmarks/multidomain/summary
publish_report_dir: ../../docs/benchmarks
publish_figure_dir: ../../docs/assets/benchmarks
hardware_source: ../../docs/benchmarks/final_experiment_summary.json

benchmarks:
  - id: sportsmot_tracktrack
    domain: sports
    dataset: SportsMOT football validation, 30 sequences
    profile: full benchmark
    detector: YOLO26m fine-tuned
    tracker: TrackTrack
    evaluation_mode: in-domain detector; official MOT GT
    metrics_source: ../../docs/benchmarks/final_experiment_summary.json
    selector: {container: trackers, key: tracker, value: tracktrack}
    fps: {row_key: cached_pipeline_fps}
    scope_note: 20,171 frames; full 30-sequence saved benchmark, not the 300-frame smoke run.

  - id: animaltrack_zebra
    domain: wildlife
    dataset: AnimalTrack Zebra subset, 5 sequences
    profile: zero-shot COCO detector
    detector: YOLO26s pretrained
    tracker: TrackTrack
    evaluation_mode: official AnimalTrack MOT GT normalized to MOTChallenge
    metrics_source: ../../outputs/benchmarks/multidomain/animaltrack_zebra/evaluation/trackeval_summary.json
    sequence_count: 5
    frame_count: 1378
    fps:
      reports:
        - ../../outputs/benchmarks/multidomain/animaltrack_zebra/zebra_1/zebra_1_tracking.metadata.json
        - ../../outputs/benchmarks/multidomain/animaltrack_zebra/zebra_2/zebra_2_tracking.metadata.json
        - ../../outputs/benchmarks/multidomain/animaltrack_zebra/zebra_3/zebra_3_tracking.metadata.json
        - ../../outputs/benchmarks/multidomain/animaltrack_zebra/zebra_4/zebra_4_tracking.metadata.json
        - ../../outputs/benchmarks/multidomain/animaltrack_zebra/zebra_5/zebra_5_tracking.metadata.json
      frames_key: frame_count
      seconds_key: timing.total_pipeline_seconds
    scope_note: Official Zebra GT; Qwen discovered wildlife/zebra but also hallucinated crocodile in the sampled scene.

  - id: ua_detrac_realtime
    domain: traffic
    dataset: UA-DETRAC MVI_40774, first 750 frames (30 seconds)
    profile: realtime adaptive zero-shot
    detector: YOLO26n pretrained, classes discovered by Qwen3-VL-4B
    tracker: OC-SORT
    evaluation_mode: official UA-DETRAC XML GT normalized to MOTChallenge
    metrics_source: ../../outputs/benchmarks/multidomain/ua_detrac_mvi_40774/evaluation/trackeval_summary.json
    sequence_count: 1
    frame_count: 750
    fps:
      reports:
        - ../../outputs/benchmarks/multidomain/ua_detrac_mvi_40774/runs/MVI_40774_750/adaptive_run_report.json
    scope_note: Qwen recovered a truncated JSON response, normalized taxi to car, and routed person/bicycle/car/bus to the COCO detector; GT evaluation covers UA-DETRAC vehicles.

  - id: ctc_zero_shot
    domain: medical microscopy
    dataset: CTC Fluo-N2DH-GOWT1, sequences 01+02
    profile: zero-shot open vocabulary
    detector: YOLOE-26s
    tracker: TrackTrack
    evaluation_mode: bbox TrackEval view of official TRA masks
    metrics_source: ../../outputs/benchmarks/multidomain/ctc_fluo_n2dh_gowt1/evaluation/trackeval_summary.json
    sequence_count: 2
    frame_count: 184
    fps:
      reports:
        - ../../outputs/benchmarks/multidomain/ctc_fluo_n2dh_gowt1/01/01_tracking.metadata.json
        - ../../outputs/benchmarks/multidomain/ctc_fluo_n2dh_gowt1/02/02_tracking.metadata.json
      frames_key: frame_count
      seconds_key: timing.total_pipeline_seconds
    scope_note: Qwen discovered microscopy/cell correctly; zero detections produced 4,575 false negatives.

  - id: ctc_adapter_tracktrack
    domain: medical microscopy
    dataset: CTC Fluo-N2DH-GOWT1, held-out sequence 02
    profile: balanced adapter
    detector: YOLO26s adapter, trained on sequence 01 only
    tracker: TrackTrack
    evaluation_mode: leakage-safe held-out bbox TrackEval
    metrics_source: ../../outputs/benchmarks/multidomain/ctc_fluo_n2dh_gowt1/evaluation_adapter_heldout/trackeval_summary.json
    sequence_count: 1
    frame_count: 92
    fps:
      reports:
        - ../../outputs/benchmarks/multidomain/ctc_fluo_n2dh_gowt1/runs_adapter/02/adaptive_run_report.json
    scope_note: Domain adapter trained on sequence 01 and evaluated only on unseen sequence 02.

  - id: ctc_adapter_ocsort
    domain: medical microscopy
    dataset: CTC Fluo-N2DH-GOWT1, held-out sequence 02
    profile: realtime adapter
    detector: YOLO26s adapter, 640 px profile
    tracker: OC-SORT
    evaluation_mode: leakage-safe held-out end-to-end profile comparison
    metrics_source: ../../outputs/benchmarks/multidomain/ctc_fluo_n2dh_gowt1/evaluation_ocsort_heldout/trackeval_summary.json
    sequence_count: 1
    frame_count: 92
    fps:
      reports:
        - ../../outputs/benchmarks/multidomain/ctc_fluo_n2dh_gowt1/runs_ocsort/02/adaptive_run_report.json
    scope_note: Realtime profile changes detector settings as well as tracker; this is not a fixed-detection tracker-only ablation.

  - id: ctc_adapter_botsort
    domain: medical microscopy
    dataset: CTC Fluo-N2DH-GOWT1, held-out sequence 02
    profile: accuracy adapter
    detector: YOLO26s adapter, 960 px profile
    tracker: BoT-SORT ReID
    evaluation_mode: leakage-safe held-out end-to-end profile comparison
    metrics_source: ../../outputs/benchmarks/multidomain/ctc_fluo_n2dh_gowt1/evaluation_botsort_heldout/trackeval_summary.json
    sequence_count: 1
    frame_count: 92
    fps:
      reports:
        - ../../outputs/benchmarks/multidomain/ctc_fluo_n2dh_gowt1/runs_botsort/02/adaptive_run_report.json
    scope_note: Accuracy profile changes detector settings as well as tracker; this is not a fixed-detection tracker-only ablation.
