experiment:
  name: tracking_sportsmot_yolo26m_oc_family
  seed: 42
  split: all

dataset:
  mot_root: data/mot/sportsmot_football
  seqmap: data/mot/sportsmot_football/seqmaps/all.txt

detections:
  cache_config: configs/legacy/football/detection_cache_yolo26m_all.yaml
  cache_root: outputs/detections/cache/yolo26m_sportsmot_football
  confidence_threshold: 0.10

trackers:
  - name: ocsort
    config: configs/trackers/ocsort_realtime.yaml
  - name: deepocsort_reid
    config: configs/trackers/deepocsort_reid_realtime.yaml

evaluation:
  trackeval_config: configs/legacy/football/trackeval.yaml
  metrics:
    - HOTA
    - CLEAR
    - Identity
  allow_partial_sequences: false

benchmark:
  render_video: false
  measure_tracker_only: true
  measure_end_to_end_from_cache: true
  warmup_sequences: 0

output:
  root: outputs/benchmarks/tracking/sportsmot_yolo26m/oc_family/runs
  tracks_root: outputs/benchmarks/tracking/sportsmot_yolo26m/oc_family/tracks
  metrics_root: outputs/benchmarks/tracking/sportsmot_yolo26m/oc_family/metrics
  figures_root: outputs/benchmarks/tracking/sportsmot_yolo26m/oc_family/figures
  videos_root: outputs/benchmarks/tracking/sportsmot_yolo26m/oc_family/videos

runtime:
  max_sequences: null
  max_frames_per_sequence: null
  overwrite: false
  fail_fast: true
  smoke_only: false
  log_level: INFO
