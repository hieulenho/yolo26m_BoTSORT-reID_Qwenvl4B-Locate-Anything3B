pipeline:
  name: adaptive_multi_domain_tracking
  schema_version: 1
  default_profile: realtime

scene_discovery:
  model_id: Qwen/Qwen3-VL-4B-Instruct
  quantization: 4bit
  quantization_by_profile:
    realtime: 4bit
    realtime_stable: 4bit
    balanced: 4bit
    accuracy: 4bit
  max_keyframes: 4
  sample_fps: 2.0
  transition_threshold: 0.45
  max_classes: 24
  max_new_tokens: 768
  realtime_max_keyframes: 2
  registry: configs/ontology/vocabulary_registry.yaml
  cache_root: outputs/cache/semantic_discovery

detector_router:
  football: models/detector/football/yolo26m_best.pt
  coco_realtime: yolo26n.pt
  coco_balanced: yolo26s.pt
  open_realtime: yoloe-26s-seg.pt
  open_balanced: yoloe-26s-seg.pt

tracking:
  router: adaptive_routed
  isolate_track_ids_by_class: false
  global_output_id_namespace: true
  profiles:
    realtime:
      default_tracker: ocsort
      small_fast_tracker: ocsort
      small_fast_config: configs/trackers/ocsort_small_fast.yaml
      appearance_verification: asynchronous
    realtime_stable:
      default_tracker: tracktrack
      small_fast_tracker: ocsort
      small_fast_config: configs/trackers/ocsort_small_fast.yaml
      appearance_verification: asynchronous
    balanced:
      default_tracker: tracktrack
      small_fast_tracker: ocsort
    accuracy:
      default_tracker: botsort_reid
      small_fast_tracker: ocsort
  class_aware: false

semantic:
  qwen_track_labeling: event_triggered
  locateanything_grounding: event_triggered
  unknown_rejection_threshold: 0.45
  fine_unknown_rejection_threshold: 0.95
  fine_minimum_margin: 0.15
  temporal_memory: true
  realtime_queue: non_blocking
  max_tracks: 0

runtime:
  sequential_gpu_stages: true
  output_root: outputs/adaptive_runs
