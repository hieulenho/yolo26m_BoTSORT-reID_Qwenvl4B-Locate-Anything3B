model:
  weights: models/detector/yolov8m_players_best.pt

dataset:
  data_yaml: data/yolo/dataset.yaml
  split: val

evaluation:
  imgsz: 960
  batch: 4
  conf: 0.001
  iou: 0.70
  max_det: 300
  device: auto
  half: false
  plots: true
  save_json: true
  save_txt: true
  save_conf: true
  verbose: true

output:
  project: outputs/evaluation
  run_name: yolov8m_finetuned_val
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures/yolov8m_finetuned

runtime:
  overwrite: false
  max_images: null
  warmup_iterations: 3
  log_level: INFO
