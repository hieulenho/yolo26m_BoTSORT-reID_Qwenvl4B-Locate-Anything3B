input:
  source_video: data/samples/match.mp4
  tracked_video: null
  tracks: outputs/tracks/adaptive/tracked.txt
  metadata: null

output:
  dir: outputs/adaptive_runs/semantic
  keyframes_dir: keyframes
  crops_dir: crops

sampling:
  keyframe_interval_seconds: 2.0
  max_keyframes: 2
  max_tracks: 0
  max_crops_per_track: 2
  max_model_images: 8
  crop_padding: 0.25
  crop_output_size: 256

model:
  provider: qwen
  model_id: Qwen/Qwen3-VL-4B-Instruct
  device: auto
  torch_dtype: auto
  quantization: 4bit
  max_new_tokens: 768
  image_min_pixels: 65536
  image_max_pixels: 524288
  temperature: 0.0
  do_sample: false
  run_model: true

prompt:
  output_schema: dynamic
  task: >-
    Assign an open hierarchical semantic label to each selected track: a stable base class
    plus a visually supported fine-grained subtype/species/make/model when possible.
    Use global keyframes for context and multi-time crops for identity. Reject uncertain
    base and fine labels independently.

runtime:
  overwrite: false
